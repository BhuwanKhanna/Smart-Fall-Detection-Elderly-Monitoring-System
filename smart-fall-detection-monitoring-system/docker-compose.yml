version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/artifacts:/app/backend/artifacts
    devices: []

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    env_file:
      - .env
    depends_on:
      - api
    ports:
      - "8501:8501"
